name: OnDeviceLab
options:
  bundleIdPrefix: dev.lanfermann.ondevicelab
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  MLXSwiftLM:
    url: https://github.com/ml-explore/mlx-swift-lm
    exactVersion: 2.31.3

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: YES
    DEAD_CODE_STRIPPING: YES

configs:
  Debug: debug
  Release: release
  Solution: debug   # same as Debug but with the SOLUTION flag (real numbers) — see schemes

targets:
  OnDeviceLab:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - OnDeviceLab
    dependencies:
      - package: MLXSwiftLM
        product: MLXLLM
      - package: MLXSwiftLM
        product: MLXLMCommon
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.lanfermann.ondevicelab
        INFOPLIST_KEY_CFBundleDisplayName: On-Device Lab
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        CODE_SIGN_STYLE: Automatic
        DEVELOPMENT_TEAM: LAC5ZD9J6Z
        # macOS SwiftUI apps are unsandboxed by default — HF model download + local file reads work with no entitlement.
      configs:
        Solution:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: [SOLUTION, DEBUG]

schemes:
  OnDeviceLab:
    build:
      targets: { OnDeviceLab: all }
    run: { config: Debug }
    archive: { config: Release }
  OnDeviceLab (Solution):
    build:
      targets: { OnDeviceLab: all }
    run: { config: Solution }
