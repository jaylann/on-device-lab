name: OnDeviceLab
options:
  bundleIdPrefix: dev.lanfermann.ondevicelab
  deploymentTarget:
    iOS: "17.0"
    macOS: "14.0"
  createIntermediateGroups: true

packages:
  MLXSwiftLM:
    url: https://github.com/ml-explore/mlx-swift-lm
    exactVersion: 2.31.3
  # Grammar-locked structured output for the open-weight side (XGrammar under the hood):
  # the mlx-swift-structured package the deck cites in Round 2. Its @Generable path is 26+,
  # but the JSON-schema path we use here works on the app's iOS 17 / macOS 14 floor.
  MLXStructured:
    url: https://github.com/petrukha-ivan/mlx-swift-structured
    majorVersion: 0.1.0
  JSONSchema:
    url: https://github.com/petrukha-ivan/swift-json-schema
    majorVersion: 2.0.2

settings:
  base:
    SWIFT_VERSION: "5.0"
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    GENERATE_INFOPLIST_FILE: YES
    DEAD_CODE_STRIPPING: YES

configs:
  Debug: debug
  Release: release
  Solution: debug   # same as Debug but with the SOLUTION flag (real numbers) — see schemes

targets:
  OnDeviceLab:
    type: application
    supportedDestinations: [iOS, macOS]
    sources:
      - OnDeviceLab
    dependencies:
      - package: MLXSwiftLM
        product: MLXLLM
      - package: MLXSwiftLM
        product: MLXLMCommon
      - package: MLXStructured
        product: MLXStructured
      - package: JSONSchema
        product: JSONSchema
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: dev.lanfermann.ondevicelab
        INFOPLIST_KEY_CFBundleDisplayName: On-Device Lab
        INFOPLIST_KEY_UIApplicationSceneManifest_Generation: YES
        INFOPLIST_KEY_UILaunchScreen_Generation: YES
        INFOPLIST_KEY_LSApplicationCategoryType: public.app-category.developer-tools
        CODE_SIGN_STYLE: Automatic
        # No DEVELOPMENT_TEAM on purpose: participants clone on their own Apple IDs. With no team,
        # macOS falls back to "Sign to Run Locally" and ⌘R just works. (Set your own team for a
        # device build; the Mac code-along needs none.)
        # macOS SwiftUI apps are unsandboxed by default — HF model download + local file reads work with no entitlement.
      configs:
        Solution:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: [SOLUTION, DEBUG]

schemes:
  OnDeviceLab:
    build:
      targets: { OnDeviceLab: all }
    run: { config: Debug }
    archive: { config: Release }
  OnDeviceLab (Solution):
    build:
      targets: { OnDeviceLab: all }
    run: { config: Solution }
